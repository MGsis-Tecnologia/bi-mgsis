services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: dash-bi:latest
    container_name: dash-bi-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_NAME=Dash BI
      - NEXT_PUBLIC_DEFAULT_CURRENCY=BRL
    restart: unless-stopped

